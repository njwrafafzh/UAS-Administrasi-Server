name: Deploy Web Dinamis to AWS EC2
on:
  push:
    branches: [ main ]
    paths: 
    - 'web-dinamis/**'
    - '.github/workflows/deploy-dinamis.yml'
  
jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-dinamis
        push: true
        # Menggunakan tag standar uas:latest sesuai dengan isi docker-compose
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/uas_dinamis_2388010005:latest

    - name: Copy Compose and SQL file to EC2 via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        source: "web-dinamis/docker-compose.yml,web-dinamis/db_data/dbcompro_nim.sql"
        target: "/home/ubuntu/container-dinamis"
        strip_components: 1 # 🔥 Menghilangkan penulisan folder induk 'web-dinamis' di target EC2

    - name: Deploy Web Dinamis via SSH and run docker compose
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/container-dinamis
          # Turunkan container lama dengan aman, tarik image baru, lalu naikkan kembali
          docker compose down || true
          docker compose pull 
          docker compose up -d